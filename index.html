<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Masika's Birthday 🎉</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- CINEMATIC INTRO -->
<div id="intro">
    <h1>🎬 Welcome to Masika's Birthday Experience 🎉</h1>
</div>

<!-- FIREWORKS CANVAS -->
<canvas id="confetti"></canvas>

<div class="container">

    <h1 class="glow">🎉 Masika's Birthday 🎉</h1>
    <h2>May 9</h2>

    <p id="countdown"></p>

    <button onclick="playMusic(); showSurprise()">
        Click for Surprise 🎁
    </button>

    <!-- SURPRISE SECTION -->
    <div id="surprise" class="hidden">

        <h2>🎉 It's My Moment! 🎉</h2>

        <p>
            Hey! I'm Masika 👑<br>
            Welcome to my birthday experience 🔥<br><br>
            Grateful for life, growth, and everything ahead 💙
        </p>

        <!-- SLIDESHOW -->
        <div class="slideshow">
            <img id="slide" src="img1.jpg">
        </div>

    </div>

    <!-- MESSAGES -->
    <div class="messages">
        <h2>💬 Birthday Wishes</h2>

        <div id="messageList"></div>

        <input type="text" id="nameInput" placeholder="Your name">
        <input type="text" id="msgInput" placeholder="Write a wish">
        <button onclick="addMessage()">Send Wish 🎉</button>
    </div>

    <!-- GAME -->
    <div class="game">
        <h2>🎮 Click Game</h2>
        <button onclick="gameClick()">Click Me!</button>
        <p id="score">Score: 0</p>
    </div>

    <!-- ADMIN -->
    <div class="admin">
        <h2>🔐 Admin Dashboard</h2>
        <button onclick="toggleAdmin()">Toggle Admin</button>

        <div id="adminPanel" class="hidden">
            <h3>Messages</h3>
            <div id="adminMessages"></div>
        </div>
    </div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="music.mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
