<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masika Birthday 🎬</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1 class="intro-text">Masika</h1>
</div>

<!-- HERO -->
<section id="hero">
    <h1>🎉 Happy Birthday 🎉</h1>
    <p id="countdown"></p>
    <button onclick="startExperience()">Enter</button>
</section>

<!-- EXPERIENCE -->
<section id="experience" class="hidden">

    <canvas id="fireworks"></canvas>

    <div class="glass">

        <button class="back-btn" onclick="goBack()">⬅ Back</button>

        <h2>✨ Celebration ✨</h2>

        <!-- SLIDESHOW -->
        <div class="slideshow">
            <img id="slide" src="img1.jpg">
        </div>

        <!-- MESSAGE INPUT ONLY -->
        <div class="messages">
            <h3>💬 Send a Wish</h3>

            <input id="nameInput" placeholder="Your name">
            <input id="msgInput" placeholder="Write your message">

            <button onclick="addMessage()">Send 🎉</button>
        </div>

    </div>

</section>

<audio id="music" loop>
    <source src="music.mp3">
</audio>

<script src="script.js"></script>
</body>
</html>
